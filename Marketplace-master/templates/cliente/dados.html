{% extends "cliente/base_cliente.html" %}

{% block title %}Meus Dados - Marketplace{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-header bg-success text-white">
                <h4 class="mb-0"><i class="bi bi-person-gear"></i> Meus Dados</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Nome Completo</label>
                        <input type="text" class="form-control" name="nome" value="{{ cliente.NOME }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">CPF</label>
                        <input type="text" class="form-control" value="{{ cliente.CPF }}" disabled>
                        <small class="text-muted">CPF não pode ser alterado.</small>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Data de Nascimento</label>
                            <input type="date" class="form-control" name="data_nascimento" value="{{ cliente.DATA_NASCIMENTO }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Sexo</label>
                            <select class="form-select" name="sexo" required>
                                <option value="Masculino" {{ 'selected' if cliente.SEXO == 'Masculino' else '' }}>Masculino</option>
                                <option value="Feminino" {{ 'selected' if cliente.SEXO == 'Feminino' else '' }}>Feminino</option>
                            </select>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Nova Senha (deixe vazio para manter)</label>
                        <input type="password" class="form-control" name="senha" placeholder="Mínimo 6 caracteres">
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-success"><i class="bi bi-save"></i> Salvar Alterações</button>
                        <a href="/cliente" class="btn btn-secondary"><i class="bi bi-x-circle"></i> Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
