{% extends "admin/base_admin.html" %}

{% block title %}{{ 'Editar' if produto else 'Adicionar' }} Produto{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-header bg-dark text-white">
                <h4 class="mb-0"><i class="bi bi-{{ 'pencil' if produto else 'plus-circle' }}"></i> {{ 'Editar' if produto else 'Adicionar' }} Produto</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Nome do Produto</label>
                        <input type="text" class="form-control" name="nome" value="{{ produto.NOME if produto else '' }}" required>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Quantidade Disponível</label>
                            <input type="number" class="form-control" name="quantidade_disponivel" value="{{ produto.QUANTIDADE_DISPONIVEL if produto else '' }}" min="0" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Valor Unitário (R$)</label>
                            <input type="number" step="0.01" class="form-control" name="valor_unitario" value="{{ produto.VALOR_UNITARIO if produto else '' }}" min="0" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Categoria</label>
                        <select class="form-select" name="id_categoria" required>
                            <option value="">Selecione uma categoria</option>
                            {% for categoria in categorias %}
                            <option value="{{ categoria.ID_CATEGORIA }}" {{ 'selected' if produto and produto.ID_CATEGORIA == categoria.ID_CATEGORIA else '' }}>{{ categoria.NOME }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> Salvar</button>
                        <a href="/admin/produtos" class="btn btn-secondary"><i class="bi bi-x-circle"></i> Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
