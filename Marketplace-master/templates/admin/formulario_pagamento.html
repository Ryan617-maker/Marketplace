{% extends "admin/base_admin.html" %}

{% block title %}{{ 'Editar' if pagamento else 'Adicionar' }} Pagamento{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-header bg-dark text-white">
                <h4 class="mb-0"><i class="bi bi-{{ 'pencil' if pagamento else 'plus-circle' }}"></i> {{ 'Editar' if pagamento else 'Adicionar' }} Pagamento</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Pedido</label>
                        <select class="form-select" name="id_pedido" required>
                            <option value="">Selecione um pedido</option>
                            {% for pedido in pedidos %}
                            <option value="{{ pedido.ID_PEDIDO }}" {{ 'selected' if pagamento and pagamento.ID_PEDIDO == pedido.ID_PEDIDO else '' }}>Pedido #{{ pedido.ID_PEDIDO }} - {{ pedido.DATA_PEDIDO }} - R$ {{ "{:,.2f}".format(pedido.VALOR_TOTAL).replace(',', '_').replace('.', ',').replace('_', '.') }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Forma de Pagamento</label>
                            <select class="form-select" name="forma_pagamento" required>
                                <option value="">Selecione</option>
                                <option value="PIX" {{ 'selected' if pagamento and pagamento.FORMA_PAGAMENTO == 'PIX' else '' }}>PIX</option>
                                <option value="CARTAO_CREDITO" {{ 'selected' if pagamento and pagamento.FORMA_PAGAMENTO == 'CARTAO_CREDITO' else '' }}>Cartão de Crédito</option>
                                <option value="CARTAO_DEBITO" {{ 'selected' if pagamento and pagamento.FORMA_PAGAMENTO == 'CARTAO_DEBITO' else '' }}>Cartão de Débito</option>
                                <option value="BOLETO" {{ 'selected' if pagamento and pagamento.FORMA_PAGAMENTO == 'BOLETO' else '' }}>Boleto</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Valor Pago (R$)</label>
                            <input type="number" step="0.01" class="form-control" name="valor_pago" value="{{ pagamento.VALOR_PAGO if pagamento else '' }}" min="0" required>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Data do Pagamento</label>
                            <input type="date" class="form-control" name="data_pagamento" value="{{ pagamento.DATA_PAGAMENTO if pagamento else '' }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Status</label>
                            <select class="form-select" name="status" required>
                                <option value="">Selecione</option>
                                <option value="PENDENTE" {{ 'selected' if pagamento and pagamento.STATUS == 'PENDENTE' else '' }}>PENDENTE</option>
                                <option value="APROVADO" {{ 'selected' if pagamento and pagamento.STATUS == 'APROVADO' else '' }}>APROVADO</option>
                                <option value="RECUSADO" {{ 'selected' if pagamento and pagamento.STATUS == 'RECUSADO' else '' }}>RECUSADO</option>
                                <option value="ESTORNADO" {{ 'selected' if pagamento and pagamento.STATUS == 'ESTORNADO' else '' }}>ESTORNADO</option>
                            </select>
                        </div>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> Salvar</button>
                        <a href="/admin/pagamentos" class="btn btn-secondary"><i class="bi bi-x-circle"></i> Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
